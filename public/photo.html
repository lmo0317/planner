<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KidsNote Photo Backup - NEO Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/photo.css?v=20260719-6">
</head>
<body>
  <main class="photo-shell">
    <header class="photo-header">
      <div>
        <a class="back-link" href="/"><i data-lucide="arrow-left"></i><span>Planner</span></a>
        <h1>키즈노트 사진 백업</h1>
        <p>추억알림장과 추억앨범 페이지를 자동으로 돌면서 사진을 서버에 저장합니다.</p>
      </div>
      <div class="photo-stats">
        <div>
          <span id="photo-count">0</span>
          <small>백업 사진</small>
        </div>
        <div>
          <span id="photo-size">0 MB</span>
          <small>사용량</small>
        </div>
      </div>
    </header>

    <section class="backup-panel">
      <div class="connection-row">
        <div id="session-state" class="session-state">
          <i data-lucide="link"></i>
          <span>키즈노트 연결 확인 중</span>
        </div>
        <button id="btn-refresh" class="btn btn-secondary" type="button">
          <i data-lucide="refresh-cw"></i><span>새로고침</span>
        </button>
      </div>

      <div class="backup-targets">
        <div><i data-lucide="notebook-tabs"></i><span>추억알림장</span><small>/service/report</small></div>
        <div><i data-lucide="images"></i><span>추억앨범</span><small>/service/album</small></div>
      </div>

      <label class="extra-url-field" for="extra-url">
        <span>특정 상세 페이지 추가</span>
        <input id="extra-url" type="url" placeholder="https://www.kidsnote.com/service/report/1354433618">
      </label>

      <button id="btn-start-backup" class="btn btn-primary backup-button" type="button" disabled>
        <i data-lucide="download-cloud"></i><span>키즈노트 사진 전체 백업 시작</span>
      </button>

      <div id="progress-panel" class="progress-panel hidden">
        <div class="progress-top">
          <strong id="progress-title">백업 준비 중</strong>
          <span id="progress-count">0 / 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-detail" class="progress-detail"></div>
      </div>
    </section>

    <section class="gallery-panel">
      <div class="gallery-toolbar">
        <h2>백업된 사진</h2>
        <div class="gallery-controls">
          <select id="sort-select" aria-label="정렬">
            <option value="sourceDateDesc">글 날짜 최신순</option>
            <option value="sourceDateAsc">글 날짜 오래된순</option>
            <option value="uploadedDesc">백업 최신순</option>
            <option value="uploadedAsc">백업 오래된순</option>
          </select>
          <div class="search-box">
            <i data-lucide="search"></i>
            <input id="search-input" type="search" placeholder="파일명 또는 출처 검색">
          </div>
        </div>
      </div>
      <div id="gallery" class="gallery"></div>
      <button id="btn-load-more" class="btn btn-secondary load-more hidden" type="button">
        <i data-lucide="chevrons-down"></i><span>더 보기</span>
      </button>
      <div id="empty-state" class="empty-state hidden">
        <i data-lucide="images"></i>
        <p>아직 백업된 키즈노트 사진이 없습니다.</p>
      </div>
    </section>
  </main>

  <div id="photo-viewer" class="photo-viewer hidden" aria-hidden="true">
    <button id="viewer-close" class="viewer-close" type="button" aria-label="닫기">
      <i data-lucide="x"></i>
    </button>
    <div class="viewer-frame" role="dialog" aria-modal="true" aria-label="사진 크게 보기">
      <img id="viewer-image" alt="">
      <div class="viewer-caption">
        <strong id="viewer-title"></strong>
        <span id="viewer-detail"></span>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/photo.js?v=20260719-6"></script>
</body>
</html>
